version: "3.9"

services:

  db:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb

    ports:
      - "5432:5432"

    volumes:
      - task-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: task-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

volumes:
  task-data: